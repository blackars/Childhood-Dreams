<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Childhood Dreams</title>
    <meta name="description" content="Childhood Dreams — hub de experiencias interactivas" />
    <meta property="og:title" content="Childhood Dreams" />
    <meta property="og:type" content="website" />
<link href="css/main.css" rel="stylesheet" />
  </head>
  <body class="intro-idle">
    <!-- INTRO INICIAL -->
    <div class="intro-overlay" id="introOverlay" aria-hidden="true">
      <button type="button" class="intro-core" id="introTrigger" aria-label="Toca para comenzar"></button>
      <div class="intro-shockwave">
      </div>
      <div class="intro-burst-particles">
        <span style="--x:-46vw; --y:-32vh; --s:1.1; --d:0.00s;">
        </span>
        <span style="--x:-28vw; --y:-44vh; --s:0.8; --d:0.04s;">
        </span>
        <span style="--x:-8vw; --y:-38vh; --s:1.4; --d:0.02s;">
        </span>
        <span style="--x:16vw; --y:-42vh; --s:0.9; --d:0.06s;">
        </span>
        <span style="--x:38vw; --y:-30vh; --s:1.2; --d:0.01s;">
        </span>
        <span style="--x:-52vw; --y:-8vh; --s:0.7; --d:0.03s;">
        </span>
        <span style="--x:-34vw; --y:6vh; --s:1.3; --d:0.08s;">
        </span>
        <span style="--x:-14vw; --y:-4vh; --s:0.9; --d:0.05s;">
        </span>
        <span style="--x:12vw; --y:8vh; --s:1.5; --d:0.02s;">
        </span>
        <span style="--x:34vw; --y:2vh; --s:0.8; --d:0.07s;">
        </span>
        <span style="--x:54vw; --y:-10vh; --s:1.1; --d:0.04s;">
        </span>
        <span style="--x:-44vw; --y:28vh; --s:1.4; --d:0.02s;">
        </span>
        <span style="--x:-22vw; --y:42vh; --s:0.8; --d:0.06s;">
        </span>
        <span style="--x:0vw; --y:34vh; --s:1.2; --d:0.03s;">
        </span>
        <span style="--x:24vw; --y:42vh; --s:1; --d:0.05s;">
        </span>
        <span style="--x:48vw; --y:26vh; --s:0.9; --d:0.01s;">
        </span>
        <span style="--x:-12vw; --y:-14vh; --s:0.7; --d:0.08s;">
        </span>
        <span style="--x:10vw; --y:-18vh; --s:1.1; --d:0.02s;">
        </span>
        <span style="--x:-20vw; --y:18vh; --s:1.3; --d:0.05s;">
        </span>
        <span style="--x:20vw; --y:20vh; --s:0.8; --d:0.04s;">
        </span>
      </div>
      <p class="intro-hint" aria-live="polite">☝︎</p>
    </div>
    <!-- BACKGROUND DE PARTÍCULAS -->
    <div class="particle-background" aria-hidden="true">
      <img src="assets/particles.svg" alt="" role="presentation" />
    </div>
    <!-- PRIMERA PANTALLA -->
    <main class="content">
      <div class="content-inner">
        <h1
            class="animated-title"
            id="mainTitle"
            role="button"
            tabindex="0"
            aria-label="Entrar a la segunda pantalla">
          Childhood Dreams
        </h1>
      </div>
    </main>
    <section class="second-screen" aria-hidden="true">
      <div class="second-screen-content">
        <div class="books-grid">
          <a href="#experiencia-1" class="book-card book-card-1" aria-label="Abrir experiencia Libro I">
            <div class="book-media">
              <video
                     src="assets/libro-1.webm"
                     autoplay
                     muted
                     loop
                     playsinline
                     preload="metadata" muted loop playsinline>
              </video>
            </div>
            <span class="book-name">Le Petit Colonel
            </span>
          </a>
          <a href="#experiencia-2" class="book-card book-card-2" aria-label="Abrir experiencia Libro II">
            <div class="book-media">
              <video
                     src="assets/libro-2.webm"
                     autoplay
                     muted
                     loop
                     playsinline
                     preload="metadata" muted loop playsinline>
              </video>
            </div>
            <span class="book-name">Momo Time Huntress
            </span>
          </a>
          <a href="#experiencia-3" class="book-card book-card-3" aria-label="Abrir experiencia Libro III">
            <div class="book-media">
              <video
                     src="assets/libro-3.webm"
                     autoplay
                     muted
                     loop
                     playsinline
                     preload="metadata" muted loop playsinline>
              </video>
            </div>
            <span class="book-name">Peter Time Junky
            </span>
          </a>
          <a href="#experiencia-4" class="book-card book-card-4" aria-label="Abrir experiencia Libro IV">
            <div class="book-media">
              <video
                     src="assets/libro-4.webm"
                     autoplay
                     muted
                     loop
                     playsinline
                     preload="metadata" muted loop playsinline>
              </video>
            </div>
            <span class="book-name">Alice In Crazyland
            </span>
          </a>
        </div>
      </div>
    </section>
    <!-- AUDIO -->
<audio id="ambientAudio" src="assets/audio/ambient.mp3" loop preload="auto"></audio>
    <audio id="titleHoverAudio" src="assets/audio/hover-title.mp3" preload="metadata"></audio>
    <audio id="cardHoverAudio" src="assets/audio/hover-card.mp3" preload="metadata"></audio>
    <audio id="clickAudio" src="assets/audio/click.mp3" preload="auto"></audio>
    <script type="module" src="js/main.js"></script>
    <!-- GAME OVERLAY -->
    <section class="game-screen" id="gameScreen" hidden aria-hidden="true">
      <header class="game-screen-bar">
        <button type="button" id="gameBack" class="game-back">← Volver</button>
        <h2 class="game-title" id="gameTitle"></h2>
        <button type="button" id="gameFullscreen" class="game-fullscreen" hidden>Pantalla completa</button>
        <a id="gameOpenExternal" class="game-external" target="_blank" rel="noopener" href="#">Abrir en itch.io</a>
      </header>
      <div class="game-frame-wrap">
        <iframe id="gameFrame" title="" allow="fullscreen; gamepad; autoplay" loading="lazy"></iframe>
      </div>
    </section>
  </body>
</html>
