    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        min-height: 100%;
        overflow-x: hidden;
        background: #000000;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        position: relative;
        transition:
          background-color 3s cubic-bezier(0.65, 0, 0.35, 1),
          color 3s cubic-bezier(0.65, 0, 0.35, 1);
      }
      /* ============================= */
      /* BACKGROUND SVG */
      /* ============================= */
      .particle-background {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
        background: #000000;
        transition:
          background-color 4.5s cubic-bezier(0.65, 0, 0.35, 1),
          filter 4.5s cubic-bezier(0.65, 0, 0.35, 1);
      }
      .particle-background svg {
        width: 100%;
        height: 100%;
        display: block;
        transform-origin: center;
        transition:
          filter 4.5s cubic-bezier(0.65, 0, 0.35, 1),
          transform 4.5s cubic-bezier(0.65, 0, 0.35, 1),
          opacity 1.2s ease;
      }
      /* ============================= */
      /* PRIMERA PANTALLA */
      /* ============================= */
      .content {
        position: relative;
        z-index: 2;
        min-height: 100vh;
        display: grid;
        place-items: center;
        color: #ffffff;
        text-align: center;
        padding: 2rem;
        transition:
          opacity 1s ease,
          transform 1s cubic-bezier(0.65, 0, 0.35, 1);
      }
      .content-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }
      .animated-title {
        display: inline-block;
        margin: 0;
        font-size: clamp(3rem, 10vw, 8rem);
        font-weight: 950;
        line-height: 0.9;
        letter-spacing: -0.08em;
        text-transform: uppercase;
        color: white;
        -webkit-text-stroke: 2px rgba(255, 255, 255, 0.92);
        text-stroke: 2px rgba(255, 255, 255, 0.92);
        cursor: pointer;
        user-select: none;
        outline: none;
        opacity: 0.82;
        animation: titleFade 4.5s ease-in-out infinite;
        transition:
          color 0.4s ease,
          -webkit-text-stroke-color 0.4s ease,
          text-shadow 0.4s ease,
          transform 0.45s cubic-bezier(0.65, 0, 0.35, 1),
          opacity 0.45s ease,
          filter 0.45s ease,
          visibility 0s linear;
      }
      .animated-title:hover,
      .animated-title:focus-visible {
        color: #ffffff;
        -webkit-text-stroke-color: #ffffff;
        text-stroke-color: #ffffff;
        opacity: 1;

          0 0 12px rgba(255, 255, 255, 0.4),
          0 0 34px rgba(255, 255, 255, 0.2);
        animation-play-state: paused;
      }
      .animated-title:active {
        transform: scale(0.975);
      }
      .subtitle {
        margin: 0;
        max-width: 620px;
        color: rgba(255, 255, 255, 0.72);
        font-size: clamp(0.95rem, 2vw, 1.15rem);
        line-height: 1.6;
        transition:
          opacity 0.9s ease,
          transform 0.9s cubic-bezier(0.65, 0, 0.35, 1),
          filter 0.9s ease;
      }
      @keyframes titleFade {
        0% {
          opacity: 0.78;
          filter: blur(0.15px);
        }
        50% {
          opacity: 1;
          filter: blur(0px);
        }
        100% {
          opacity: 0.78;
          filter: blur(0.15px);
        }

      /* ============================= */
      /* SEGUNDA PANTALLA */
      /* ============================= */
      .second-screen {
        position: fixed;
        inset: 0;
        z-index: 1;
        opacity: 0;
        pointer-events: none;
        background: transparent;
        transition:
          opacity 1.2s cubic-bezier(0.65, 0, 0.35, 1);

      .second-screen-content {
        width: 100%;
        min-height: 100vh;
      }
      /* Estado activo al hacer click */
      body.second-screen-active {
        background-color: #ffffff;
        color: #000000;
      }
      body.second-screen-active .particle-background {
        background-color: #ffffff;
      }
      /*
      Invierte todo el SVG:
      - Fondo negro pasa a blanco.
      - Partículas blancas pasan a negras.

        filter: invert(1);
        transform: scale(1.045);

      body.second-screen-active .animated-title {

        pointer-events: none;
      }
      body.second-screen-active .second-screen {
        opacity: 1;
      }
      @media (prefers-reduced-motion: reduce) {
        body:not(.intro-playing) *,
        body:not(.intro-playing) *::before,
        body:not(.intro-playing) *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
        }
      }
      /* ============================= */
      /* GRID DE LIBROS - SEGUNDA PANTALLA */
      /* ============================= */
      .second-screen {
        position: fixed;
        inset: 0;
        z-index: 3;

      /* Grid 2x2 */
      .books-grid {

      body.second-screen-active .books-grid {

      }
      /* Tarjeta clickeable */
      .book-card {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;

        border: none;

        cursor: pointer;

          border-color 0.35s ease,
          background-color 0.35s ease,
          box-shadow 0.35s ease;

      /* Entrada individual con stagger */
      body.second-screen-active .book-card {
        opacity: 1;
        transform: translateY(0) scale(1);

      body.second-screen-active .book-card-1 {
        transition-delay: 1.3s;
      }
      body.second-screen-active .book-card-2 {
        transition-delay: 1.45s;
      }
      body.second-screen-active .book-card-3 {
        transition-delay: 1.6s;
      }
      body.second-screen-active .book-card-4 {
        transition-delay: 1.75s;
      }
      /* Efecto flotante permanente */
      body.second-screen-active .book-card-1 {
        animation: floatBookOne 6.5s ease-in-out infinite;
      }
      body.second-screen-active .book-card-2 {
        animation: floatBookTwo 7.2s ease-in-out infinite;
      }
      body.second-screen-active .book-card-3 {
        animation: floatBookThree 6.8s ease-in-out infinite;
      }
      body.second-screen-active .book-card-4 {
        animation: floatBookFour 7.6s ease-in-out infinite;
      }
      /* Brillo sutil dentro de cada tarjeta */
      .book-card::before {
      }
      .book-card::after {
      }
      .book-card:hover {
        transform: translateY(-10px) scale(1.035);
        border-color: rgba(0, 0, 0, 0.42);
        background: rgba(255, 255, 255, 0.58);
        box-shadow:
          0 32px 90px rgba(0, 0, 0, 0.16),
          inset 0 0 0 1px rgba(255, 255, 255, 0.65);
      }
      .book-card:hover::before {
        opacity: 1;
      }
      .book-card:hover::after {
        left: 130%;
        opacity: 1;
      }
      .book-card:active {
        transform: translateY(-4px) scale(0.985);
      }
      /* Contenedor del webm */
      .book-media {
        position: relative;
        width: min(70%, 220px);
        aspect-ratio: 1 / 1;
        display: grid;
        place-items: center;
        margin-bottom: 1.1rem;
        z-index: 1;
      }
      .book-media video {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
        filter:
          drop-shadow(0 18px 24px rgba(0, 0, 0, 0.22))
          contrast(1.05);
        transition:
          transform 0.45s cubic-bezier(0.65, 0, 0.35, 1),
          filter 0.45s ease;
      }
      .book-card:hover .book-media video {
        transform: scale(2.50) rotate(-1deg);
        filter:
          drop-shadow(0 26px 34px rgba(0, 0, 0, 0.28))
          contrast(1.12);
      }
      /* Nombre bajo el webm */
      .book-name {
        position: relative;
        z-index: 1;
        font-size: clamp(1rem, 2.2vw, 1.45rem);
        font-weight: 800;
        letter-spacing: -0.04em;
        text-transform: uppercase;
        color: #000000;
        opacity: 0.78;
        transition:
          opacity 0.35s ease,
          transform 0.35s cubic-bezier(0.65, 0, 0.35, 1),
          letter-spacing 0.35s ease;
      }
      .book-card:hover .book-name {
        opacity: 1;
        transform: translateY(4px);
        letter-spacing: 0.02em;
      }
      /* Animaciones flotantes */
      @keyframes floatBookOne {
        0%, 100% {
          translate: 0 0;
        }
        50% {
          translate: 0 -12px;
        }
      }
      @keyframes floatBookTwo {
        0%, 100% {
          translate: 0 0;
        }
        50% {
          translate: 8px -16px;
        }
      }
      @keyframes floatBookThree {
        0%, 100% {
          translate: 0 0;
        }
        50% {
          translate: -8px -14px;
        }
      }
      @keyframes floatBookFour {
        0%, 100% {
          translate: 0 0;
        }
        50% {
          translate: 6px -10px;
        }
      }
      /* Responsive */
      @media (max-width: 720px) {
        .books-grid {
          grid-template-columns: 1fr;
          width: min(92vw, 420px);
          gap: 1.2rem;
          padding-block: 3rem;
        }
        .second-screen {
          overflow-y: auto;
        }
        .second-screen-content {
          min-height: auto;
          align-items: start;
        }
        .book-card {
          min-height: 210px;
        }
        .book-media {
          width: min(58%, 170px);
        }
      }
      /* ============================= */
      /* INTRO: CÍRCULO / EXPLOSIÓN */
      /* ============================= */
      .intro-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background: #000000;
        overflow: hidden;
        pointer-events: none;

    .intro-shockwave {

    }
          .intro-burst-particles {

      body.particles-visible .particle-background {
        opacity: 1;

      /* Oculta el título durante la intro */
      body.intro-playing .animated-title {

      /* Círculo respirando y explotando */
      @keyframes introBreathExplode {
        0% {

1 */

    <!-- AUDIO -->
    <audio id="ambientAudio" src="assets/audio/ambient.mp3" loop preload="auto"></audio>
    <audio id="titleHoverAudio" src="assets/audio/hover-title.mp3" preload="auto"></audio>
    <audio id="cardHoverAudio" src="assets/audio/hover-card.mp3" preload="auto"></audio>
    <audio id="clickAudio" src="assets/audio/click.mp3" preload="auto"></audio>
    <script>
      window.addEventListener('DOMContentLoaded', () => {
        const title = document.getElementById('mainTitle');
        const intro = document.querySelector('.intro-overlay');
        /*
      Timeline intro:
      0s     - círculo blanco respira
      2.65s  - explosión visual
      2.85s  - aparecen partículas reales del fondo
      3.65s  - intro empieza a desaparecer
      4.35s  - aparece Childhood Dreams
      5.60s  - se elimina overlay de intro
    */
        /* ============================= */
        /* AUDIO MANAGER */
        /* ============================= */

        const ambientAudio = document.getElementById('ambientAudio');
        const titleHoverAudio = document.getElementById('titleHoverAudio');
        const cardHoverAudio = document.getElementById('cardHoverAudio');
        const clickAudio = document.getElementById('clickAudio');

        let audioUnlocked = false;

        function configureAudio() {
          if (ambientAudio) {
            ambientAudio.volume = 0.28;
          }

          if (titleHoverAudio) {
            titleHoverAudio.volume = 0.45;
          }

          if (cardHoverAudio) {
            cardHoverAudio.volume = 0.35;
          }

          if (clickAudio) {
            clickAudio.volume = 0.5;
          }
        }

        function unlockAudio() {
          if (audioUnlocked) return;

          audioUnlocked = true;

          if (ambientAudio) {
            ambientAudio
              .play()
              .catch((error) => {
              console.warn('Ambient audio could not start:', error);
            });
          }
        }

        function playSound(audioElement) {
          if (!audioUnlocked || !audioElement) return;

          audioElement.currentTime = 0;

          audioElement
            .play()
            .catch((error) => {
            console.warn('Sound could not play:', error);
          });
        }

        configureAudio();

        /*
  Los navegadores bloquean audio hasta la primera interacción.
  Esto desbloquea la música ambiental con la primera acción real del usuario.
*/
        window.addEventListener('pointerdown', unlockAudio, { once: true });
        window.addEventListener('keydown', unlockAudio, { once: true });
        setTimeout(() => {
          document.body.classList.add('particles-visible');
        }
                   , 5750);
        setTimeout(() => {
          document.body.classList.add('intro-fadeout');
        }
                   , 6500);
        setTimeout(() => {
          document.body.classList.add('title-visible');
          document.body.classList.remove('intro-playing');
        }
                   , 7600);
        setTimeout(() => {
          if (intro) {
            intro.remove();
          }
        }
                   , 9200);
      function goToSecondScreen() {
        document.body.classList.add('second-screen-active');

        setTimeout(() => {
          document.body.classList.add('books-ready');
        }, 2200);
      }
        if (title) {
          title.addEventListener('click', goToSecondScreen);
          title.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' || event.key === ' ') {
              event.preventDefault();
              goToSecondScreen();
            }
          }
                                );
        }
        /*
      Opcional para desarrollo:
      Presiona Escape para volver a la primera pantalla.
      Si no lo quieres, puedes borrar este bloque.
    */
        document.addEventListener('keydown', (event) => {
          if (event.key === 'Escape') {
            document.body.classList.remove('second-screen-active');
          }
        }
                                 );
      }
                             );
    </script>
